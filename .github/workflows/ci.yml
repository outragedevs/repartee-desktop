name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt -p repartee-gui -- --check

      - name: Clippy
        run: cargo clippy -p repartee-gui --locked -- -D warnings

      - name: Build
        run: cargo build -p repartee-gui --locked

      - name: Test
        run: cargo test -p repartee-gui --locked
