name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            artifact: repartee-gui-macos-arm64
            ext: tar.gz
          - name: macOS x64
            runner: macos-13
            artifact: repartee-gui-macos-x64
            ext: tar.gz
          - name: Linux amd64
            runner: ubuntu-24.04
            artifact: repartee-gui-linux-amd64
            ext: tar.gz
          - name: Windows x64
            runner: windows-latest
            artifact: repartee-gui-windows-x64
            ext: zip
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.artifact }}

      # Release profile (LTO + strip) is defined at the workspace root.
      - name: Build release binary
        run: cargo build --release --locked -p repartee-gui

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz -C target/release repartee-gui

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/repartee-gui.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
